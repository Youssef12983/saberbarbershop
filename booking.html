<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Saber Barber — Réservation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200;300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="css/stars.css"/>
  <link rel="stylesheet" href="css/navbar.css"/>
  <link rel="stylesheet" href="css/booking.css"/>
  <link rel="icon" href="assets/images/logo.png"/>
</head>
<body>

<canvas id="starsCanvas"></canvas>
<div id="loading"><img src="assets/images/logo.png" alt="Saber Barber"/></div>

<nav class="navbar" id="navbar">
  <div class="nav-logo" onclick="goTo('index.html')">
    <img src="assets/images/logo.png" alt="Saber Barber"/>
  </div>
  <div class="nav-links" id="navLinks">
    <a onclick="goTo('index.html');closeNav()">Accueil</a>
    <a onclick="goTo('barbers.html');closeNav()">L'Équipe</a>
    <a onclick="goTo('admin.html');closeNav()" class="nav-admin">⚙ Équipe</a>
  </div>
  <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
</nav>

<div class="booking-page" style="position:relative;z-index:1;">
  <button class="back-btn" onclick="history.back()">← Retour aux barbiers</button>

  <div class="barber-banner">
    <div class="barber-banner-avatar" id="bookAvatar"></div>
    <div>
      <div class="barber-banner-label">Votre barbier sélectionné</div>
      <div class="barber-banner-name" id="bookName"></div>
    </div>
  </div>

  <div id="bookSuccess" class="success-box">
    <div style="font-size:2rem;margin-bottom:10px;">✦</div>
    <h3>Rendez-vous Confirmé !</h3>
    <p id="successMsg"></p>
    <div style="margin-top:24px;">
      <a href="barbers.html" class="btn-glow" style="display:inline-flex;">← Retour à l'équipe</a>
    </div>
  </div>

  <div id="bookFormWrap">
    <div class="booking-grid">
      <div>
        <div class="form-group"><label>Nom complet</label><input type="text" id="cName" placeholder="Votre nom complet"/></div>
        <div class="form-group"><label>Téléphone</label><input type="tel" id="cPhone" placeholder="+1 (000) 000-0000"/></div>
        <div class="form-group"><label>Courriel</label><input type="email" id="cEmail" placeholder="votre@courriel.com"/></div>
        <div class="form-group">
          <label>Service</label>
          <select id="cService">
            <option value="">Choisir un service...</option>
            <option value="Coupe Classique (45 min)">Coupe Classique — 45 min</option>
            <option value="Taille de Barbe (30 min)">Taille de Barbe — 30 min</option>
            <option value="Soin Complet (1 h)">Soin Complet — 1 h</option>
            <option value="Rasage au Rasoir (45 min)">Rasage au Rasoir — 45 min</option>
          </select>
        </div>
        <button class="btn-glow" onclick="confirmBooking()" style="width:100%;justify-content:center;border-radius:4px;">
          <svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
          Confirmer le Rendez-vous
        </button>
      </div>
      <div>
        <div class="date-nav">
          <button onclick="changeDay(-1)">&#8592;</button>
          <div class="current-date" id="curDate"></div>
          <button onclick="changeDay(1)">&#8594;</button>
        </div>
        <div class="slots-label">Créneaux disponibles</div>
        <div class="slots-grid" id="slotsGrid"></div>
        <div class="slots-legend">
          <span>⬜ Libre</span>
          <span class="leg-sel">■ Sélectionné</span>
          <span>▪ Réservé</span>
        </div>
      </div>
    </div>
  </div>
</div>

<footer style="position:relative;z-index:1;">
  <div style="text-align:center;"><div class="footer-bottom-text">© 2026 Saber Barber</div></div>
</footer>

<script src="js/utils.js"></script>
<script src="js/stars.js"></script>
<script src="js/navbar.js"></script>
<script src="js/app.js"></script>
<script src="js/booking.js"></script>
<script>
window.addEventListener('load',()=>{
  initStars(); initNavbar(); hideLoading(800); initBookingPage();
});
</script>
</body>
</html>
